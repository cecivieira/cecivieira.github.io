site:
  name: Ana Cecília Vieira
  description: 'Blog personal para compartir aprendizajes y unir mis experiéncias en las comunidades de tecnología.'
  author-description: "Analista de datos experta en apertura de datos gubernamentales. Entusiasta de temas como datos abiertos, código abierto y comunidades autogestionadas como herramientas para el cambio social. Especialista en Inteligencia Artificial y Aprendizaje Automático. Actualmente está como coordinadora de Gobernanza de TIC y Datos Abiertos en la UFPE, además de ejercer el liderazgo técnico del equipo de Datos en la Secretaría Nacional de las Periferias, del Ministerio de las Ciudades. También es podcaster en Pizza de Datos."
  keywords: Tecnología
  lang: es
